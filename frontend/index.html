<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandGesture Studio | Fluid Interface</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fonts: Inter (Sans) & Playfair Display (Serif) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f8f9fa;
            /* Light Background */
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            cursor: none;
            /* Hide default cursor */
        }

        #root {
            width: 100vw;
            height: 100vh;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Smooth Fade In */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .animate-fadeIn {
            animation: fadeIn 1.5s ease-out forwards;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- App Logic -->
    <script type="text/babel" src="/static/app.jsx?v=8"></script>
</body>

</html>
